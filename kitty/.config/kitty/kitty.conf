# FONTS
font_family        family="JetBrains Mono"
bold_font          auto
italic_font        auto
bold_italic_font   auto
font_size          12
disable_ligatures  never

# TABS & WINDOW
tab_bar_edge            top
tab_bar_margin_width	2.0
tab_bar_margin_height	2.0 2.0
tab_bar_style           powerline
tab_powerline_style     slanted
tab_bar_align           left
tab_bar_min_tabs        1
tab_switch_strategy	left
hide_window_decorations no
enabled_layouts         *

# CURSOR, MOUSE & POINTER
shell_intergration           no-cursor
cursor_shape                 block
cursor_shape_unfocused       underline
cursor_underline_thickness   2.0
cursor_blink_interval        0.5
pointer_shape_when_dragging  beam
focus_follows_mouse          no
cursor_trail                 100
cursor_trail_decay           0.3 0.8
scrollbar                    scrolled-and-hovered
scrollbar_interactive        yes
scrollbar_width              0.7
scrollbar_hover_width        1.4
mouse_hide_wait              -1
touch_scroll_multiplier      8

# LOOKS & FEELS
background_opacity    1
background_blur       10
window_border_width   2pt
window_padding_width  6
enable_audio_bell     no
window_alert_on_bell  no
notify_on_cmd_finish  invisible 20
scrollback_lines      5000
visual_bell_duration  0.2
draw_window_borders_for_single_window     yes
window_margin_width 0


# HYPERLINKS
show_hyperlink_targets  yes
underline_hyperlinks    hover

#SHELL
shell /bin/zsh

# BEGIN_KITTY_THEME
# Moonstone — cool slate monochrome
# https://github.com/HighTecno/dotfiles

## name:    Moonstone
## license: MIT

background              #0f1014
foreground              #c0c8d4
selection_background    #2a2e38
selection_foreground    #dce0e8
url_color               #8d97a8
cursor                  #dce0e8
cursor_text_color       #0f1014

# Tabs
active_tab_background   #c0c8d4
active_tab_foreground   #0f1014
inactive_tab_background #1a1d24
inactive_tab_foreground #505868

# Windows
active_border_color     #8d97a8
inactive_border_color   #2a2e38

# normal — dark → light luminance ramp
color0   #0f1014
color1   #374049
color2   #607080
color3   #7c8898
color4   #8d97a8
color5   #5d6676
color6   #a8b2be
color7   #c0c8d4

# bright — shifted one stop lighter
color8   #262930
color9   #4c5768
color10  #788490
color11  #8e98a6
color12  #9fa8b6
color13  #737e8e
color14  #b8c0ca
color15  #dce0e8

# extended
color16  #404a58
color17  #1e2228
# END_KITTY_THEME
