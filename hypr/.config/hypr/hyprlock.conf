# ──────────────────────────────────────────────────────
# hyprlock.conf — Moonstone Theme
# https://github.com/HighTecno/dotfiles
# ──────────────────────────────────────────────────────

general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
    no_fade_out         = false
}

# ── BACKGROUND ────────────────────────────────────────
background {
    monitor     =
    color       = rgb(0f1014)   # background
    blur_passes = 0
    blur_size   = 0
}

# ── CLOCK ─────────────────────────────────────────────
label {
    monitor   =
    text      = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color     = rgba(dce0e8ff)  # color15 / cursor
    font_size = 80
    font_family = monospace

    position  = 0, 120
    halign    = center
    valign    = center
}

label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +"%A, %d %B %Y")"
    color     = rgba(8d97a8ff)  # color4 / active_border_color
    font_size = 18
    font_family = monospace

    position  = 0, 40
    halign    = center
    valign    = center
}

# ── INPUT FIELD ───────────────────────────────────────
input-field {
    monitor         =
    size            = 280, 48
    outline_thickness = 2
    dots_size       = 0.28
    dots_spacing    = 0.2
    dots_center     = true

    outer_color     = rgb(2a2e38)   # selection_background / inactive_border
    inner_color     = rgb(1a1d24)   # inactive_tab_background
    font_color      = rgb(c0c8d4)   # foreground
    fade_on_empty   = true
    fade_timeout    = 1000
    placeholder_text = <span foreground="##505868">password</span>  # inactive_tab_foreground
    hide_input      = false
    rounding        = 6

    check_color     = rgb(8d97a8)   # color4 / active_border_color
    fail_color      = rgb(4c5768)   # color9
    fail_text       = <span foreground="##4c5768"><i>$FAIL <b>($ATTEMPTS)</b></i></span>
    fail_transition = 300

    capslock_color  = rgb(607080)   # color2
    numlock_color   = rgb(607080)   # color2
    bothlock_color  = rgb(607080)   # color2

    position        = 0, -60
    halign          = center
    valign          = center
}

# ── STATUS / HINT LABEL ───────────────────────────────
label {
    monitor   =
    text      = $USER
    color     = rgba(505868ff)  # inactive_tab_foreground
    font_size = 13
    font_family = monospace

    position  = 0, -120
    halign    = center
    valign    = center
}
