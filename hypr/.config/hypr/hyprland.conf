################################################################################
# HYPRLAND CONFIG
################################################################################

################
### MONITORS ###
################

monitor = desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297, 1920x1080@239.76, 0x0, 1
monitor = desc:Dell Inc. DELL P2719H 8D10MS2, 1920x1080@60, 1920x0, 1
monitor = desc:AU Optronics 0x403D, 1920x1080@60, 3840x0, 1.5
monitor = , preferred, auto, 1    # fallback for any other monitor

####################
### WORKSPACES ###
####################

workspace = 1, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297
workspace = 2, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297
workspace = 3, monitor:desc:Dell Inc. DELL P2719H 8D10MS2
workspace = 4, monitor:desc:Dell Inc. DELL P2719H 8D10MS2
workspace = 5, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297

###################
### LID SWITCH ###
###################

bindl = , switch:on:Lid Switch, exec, hyprctl keyword monitor "desc:AU Optronics 0x403D, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "desc:AU Optronics 0x403D, 1920x1080@60, 3840x0, 1.5"

###################
### PROGRAMS ###
###################

$terminal = kitty
$fileManager = dolphin
$menu = rofi -show drun
$mainMod = SUPER

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#####################
### LOOK & FEEL ###
#####################

general {
    gaps_in = 5
    gaps_out = 20
    border_size = 2
    layout = dwindle
}

decoration {
    rounding = 10
    active_opacity = 0.92 
    inactive_opacity = 0.80
    fullscreen_opacity = 1.9
    blur {
        enabled = true
        size = 3
        passes = 1

    
    }
}

dwindle {
    pseudotile = true
    preserve_split = true
}
###################
### INPUT ###
###################

input {
    kb_layout = ch
    follow_mouse = 1
}

###################
### KEYBINDS ###
###################

# --- APPS ---
bind = $mainMod, Q, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, R, exec, $menu

# --- SYSTEM ---
bind = $mainMod, C, killactive
bind = $mainMod, ESCAPE, exec, hyprlock
bind = $mainMod, M, exit

# --- WINDOW STATE ---
bind = $mainMod, F, fullscreen
bind = $mainMod, V, togglefloating
bind = $mainMod SHIFT, F, exec, hyprctl dispatch togglefloating; hyprctl dispatch centerwindow
bind = $mainMod, P, pseudo
bind = $mainMod CTRL, T, layoutmsg, togglesplit

###################
# FOCUS (ARROWS)
###################
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

###################
# FOCUS (VIM)
###################
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

###################
# MOVE WINDOWS
###################
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

###################
# RESIZE
###################
bind = $mainMod CTRL, H, resizeactive, -60 0
bind = $mainMod CTRL, L, resizeactive, 60 0
bind = $mainMod CTRL, K, resizeactive, 0 -60
bind = $mainMod CTRL, J, resizeactive, 0 60

###################
# WORKSPACES
###################
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

###################
# SCRATCHPAD
###################
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

###################
# CLIPBOARD
###################
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

###################
# WINDOW RULES
###################
windowrule = match:class ^(rofi)$, no_anim on
windowrule = match:class ^(pavucontrol)$, float on
windowrule = match:class ^(blueman-manager)$, float on
windowrule = match:class ^(nm-connection-editor)$, float on

###################
# SCREENSHOTS
###################
bind = , Print, exec, grimblast copy active
bind = SHIFT, Print, exec, grimblast copy area

###################
# AUDIO
###################
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle

###################
# WINDOW RULES  
###################
