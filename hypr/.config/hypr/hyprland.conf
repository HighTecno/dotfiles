################################################################################
# HYPRLAND CONFIG — enhanced eye candy edition
################################################################################

################
### MONITORS ###
################

monitor = desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297, 1920x1080@239.76, 0x0, 1
monitor = desc:Dell Inc. DELL P2719H 8D10MS2, 1920x1080@60, 1920x0, 1
monitor = desc:AU Optronics 0x403D, 1920x1080@60, 3840x0, 1.25
monitor = , preferred, auto, 1    # fallback for any other monitor

####################
### WORKSPACES ###
####################

workspace = 1, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297
workspace = 2, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297
workspace = 3, monitor:desc:Dell Inc. DELL P2719H 8D10MS2
workspace = 4, monitor:desc:Dell Inc. DELL P2719H 8D10MS2
workspace = 5, monitor:desc:ASUSTek COMPUTER INC VG279QM S5LMQS057297

###################
### LID SWITCH ###
###################

bindl = , switch:on:Lid Switch,  exec, hyprctl keyword monitor "desc:AU Optronics 0x403D, disable"
bindl = , switch:off:Lid Switch, exec, hyprctl keyword monitor "desc:AU Optronics 0x403D, 1920x1080@60, 3840x0, 1.5"

###################
### PROGRAMS ###
###################

$terminal    = kitty
$fileManager = thunar
$menu        = rofi -show drun
$mainMod     = SUPER
$browser     = firefox

#################
### AUTOSTART ###
#################

exec-once = waybar
exec-once = dunst
exec-once = hyprpaper
exec-once = hypridle
exec-once = nm-applet --indicator
exec-once = systemctl --user start hyprpolkitagent
exec-once = wl-paste --type text  --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

#####################
### LOOK & FEEL ###
#####################

general {
    gaps_in           = 6
    gaps_out          = 16
    border_size       = 2


    col.active_border   = rgba(8d97a8ff) rgba(a8b2beff) rgba(607080ff) 45deg
    col.inactive_border = rgba(2a2e38cc)

    layout            = dwindle
    resize_on_border  = true         # drag any edge to resize
}

decoration {
    rounding          = 12

    active_opacity    = 0.8
    inactive_opacity  = 0.62
    fullscreen_opacity = 1.0         # fixed: must be ≤ 1.0

    # drop shadows
    shadow {
        enabled       = true
        range         = 24
        render_power  = 4
        color          = rgba(0f1014cc)
        color_inactive = rgba(0f101466)
        offset        = 0 4
    }

    blur {
        enabled           = true
        size              = 8
        passes            = 3
        noise             = 0.02
        contrast          = 0.88
        brightness        = 0.80
        vibrancy          = 0.18
        vibrancy_darkness = 0.5
        special           = true     # blur special workspace too
        popups            = true     # blur popups / tooltips
    }
}

# Smooth, springy animations
animations {
    enabled = true

    bezier = easeOutExpo,  0.16, 1,    0.3,  1
    bezier = easeOutBack,  0.34, 1.56, 0.64, 1
    bezier = easeInOut,    0.85, 0,    0.15, 1
    bezier = linear,       0,    0,    1,    1

    # Windows
    animation = windowsIn,    1, 5,  easeOutBack,  slide
    animation = windowsOut,   1, 4,  easeInOut,    slide
    animation = windowsMove,  1, 4,  easeOutExpo

    # Borders
    animation = border,       1, 8,  linear
    animation = borderangle,  1, 100, linear, loop   # animated gradient sweep

    # Fade
    animation = fade,         1, 4,  easeInOut
    animation = fadeDim,      1, 4,  easeInOut

    # Workspaces — satisfying slide with slight overshoot
    animation = workspaces,   1, 5,  easeOutBack,  slide
    animation = specialWorkspace, 1, 5, easeOutExpo, slidevert
}

dwindle {
    pseudotile     = true
    preserve_split = true
    smart_split    = true      # auto-picks split direction
    smart_resizing = true
}

misc {
    force_default_wallpaper  = 0
    disable_hyprland_logo    = true
    animate_manual_resizes   = true
    animate_mouse_windowdragging = true
    vfr                      = true    # variable frame rate (saves power on idle)
}

###################
### INPUT ###
###################

input {
    kb_layout    = ch
    follow_mouse = 1

    touchpad {
        natural_scroll    = true
        tap-to-click      = true
        drag_lock         = true
    }
}

gestures {
    # workspace_swipe/fingers/invert/cancel_ratio removed in 0.51
    workspace_swipe_distance = 300   # still valid: distance threshold

    # new 1:1 gesture system: 3-finger horizontal swipe → switch workspace
    gesture = 3, horizontal, workspace
}

###################
### KEYBINDS ###
###################

# --- APPS ---
bind = $mainMod,       Q,     exec, $terminal
bind = $mainMod,       E,     exec, $fileManager
bind = $mainMod,       B,     exec, $browser
bind = ALT,            SPACE, exec, $menu

# --- SYSTEM ---
bind = $mainMod,       C,      killactive
bind = $mainMod,       ESCAPE, exec, hyprlock
bind = $mainMod,       M,      exit

# --- WINDOW STATE ---
bind = $mainMod,       F,      fullscreen
bind = $mainMod,       V,      togglefloating
bind = $mainMod SHIFT, F,      exec, hyprctl dispatch togglefloating; hyprctl dispatch centerwindow
bind = $mainMod,       P,      pseudo
bind = $mainMod CTRL,  T,      layoutmsg, togglesplit



# --- FOCUS ---
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# --- MOVE WINDOWS ---
bind = $mainMod SHIFT, H, movewindow, l
bind = $mainMod SHIFT, L, movewindow, r
bind = $mainMod SHIFT, K, movewindow, u
bind = $mainMod SHIFT, J, movewindow, d

# --- RESIZE ---
bind = $mainMod CTRL, H, resizeactive, -60 0
bind = $mainMod CTRL, L, resizeactive,  60 0
bind = $mainMod CTRL, K, resizeactive,  0 -60
bind = $mainMod CTRL, J, resizeactive,  0  60

# --- WORKSPACES ---
bind = $mainMod,       1, workspace,      1
bind = $mainMod,       2, workspace,      2
bind = $mainMod,       3, workspace,      3
bind = $mainMod,       4, workspace,      4
bind = $mainMod,       5, workspace,      5

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5

# --- SCRATCHPAD ---
bind = $mainMod,       S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace,        special:magic

# --- CLIPBOARD ---
bind = $mainMod SHIFT, V, exec, cliphist list | rofi -dmenu -p "Clipboard" | cliphist decode | wl-copy

# --- SCREENSHOTS ---
bind = ,       Print, exec, grimblast copy active
bind = SHIFT,  Print, exec, grimblast copy area

# --- AUDIO ---
bindel = , XF86AudioRaiseVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bindel = , XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = , XF86AudioMute,        exec, wpctl set-mute   @DEFAULT_AUDIO_SINK@ toggle

####################
### WINDOW RULES ###
####################

# Rofi — no animation, no blur overhead
windowrule = match:class ^(rofi)$,               no_anim on

# System floats
windowrule = match:class ^(pavucontrol)$,         float on
windowrule = match:class ^(pavucontrol)$,         size 700 400
windowrule = match:class ^(pavucontrol)$,         center on

windowrule = match:class ^(blueman-manager)$,     float on
windowrule = match:class ^(blueman-manager)$,     center on

windowrule = match:class ^(nm-connection-editor)$, float on
windowrule = match:class ^(nm-connection-editor)$, center on

# Thunar 
windowrule = match:class ^(thunar)$,  float on
windowrule = match:class ^(thunar)$,  size 960 620
windowrule = match:class ^(thunar)$,  center on
windowrule = match:class ^(thunar)$,  opacity 0.96 0.88
windowrule = match:class ^(thunar)$,  rounding 14
windowrule = match:class ^(thunar)$,  animation slide

# Dolphin 
windowrule = match:class ^(dolphin)$, float on
windowrule = match:class ^(dolphin)$, size 1000 660
windowrule = match:class ^(dolphin)$, center on
windowrule = match:class ^(dolphin)$, opacity 0.96 0.88
windowrule = match:class ^(dolphin)$, rounding 14
windowrule = match:class ^(dolphin)$, animation slide

# Terminal — 
windowrule = match:class ^(kitty)$,   opacity 0.800 0.700

# Firefox — fully opaque when active, slight dim when inactive
windowrule = match:class ^(firefox)$, opacity 0.93 0.83

# Picture-in-picture — always on top, pinned
windowrule = match:title ^(Picture-in-Picture)$, float on
windowrule = match:title ^(Picture-in-Picture)$, pin on
windowrule = match:title ^(Picture-in-Picture)$, size 480 270
windowrule = match:title ^(Picture-in-Picture)$, move 100%-500 100%-290

# Notifications (dunst) — no shadow, no blur
windowrule = match:class ^(dunst)$,   no_shadow on
windowrule = match:class ^(dunst)$,   no_blur on
