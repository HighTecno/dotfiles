# ============================================================
#  Timeline:
#    270s  → dim screen to 20% (warning)
#    300s  → lock with hyprlock
#    360s  → display off
#    900s  → suspend
# ============================================================

general {
    lock_cmd         = pidof hyprlock || hyprlock      # don't spawn multiple locks
    before_sleep_cmd = hyprlock                        # lock before suspend
    after_sleep_cmd  = hyprctl dispatch dpms on        # wake display on resume
}

# Step 1: dim as warning (30s before lock)
listener {
    timeout    = 270
    on-timeout = brightnessctl -s set 20%
    on-resume  = brightnessctl -r
}

# Step 2: lock
listener {
    timeout    = 300
    on-timeout = hyprlock
}

# Step 3: turn display off
listener {
    timeout    = 360
    on-timeout = hyprctl dispatch dpms off
    on-resume  = hyprctl dispatch dpms on
}

# Step 4: suspend after 15 min
listener {
    timeout    = 900
    on-timeout = systemctl suspend
}
